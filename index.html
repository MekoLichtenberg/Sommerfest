<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:   #F5C842;
    --orange: #F47A1F;
    --blue:   #3B82F6;
    --silver: #C0C8D8;
    --bronze: #D4845A;
    --bg:     #070b16;
    --card:   #0f1320;
    --border: rgba(255,255,255,0.08);
    --text:   #F0EEF8;
    --muted:  rgba(240,238,248,0.45);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1rem 4rem;
    overflow-x: hidden;
  }

  /* starfield */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 8%,  rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 67% 55%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 83% 18%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 72%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 88%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 95%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header { text-align: center; margin-bottom: 1.6rem; position: relative; z-index: 1; }

  /* blasses Logo-Wasserzeichen hinter der Liste */
  .watermark {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: min(92vw, 720px); opacity: 0.12; pointer-events: none; z-index: 0;
  }

  .event-label {
    font-weight: 300; font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
  }
  .logo {
    display: block; width: 100%; max-width: 240px; height: auto; margin: 0 auto;
    filter: drop-shadow(0 6px 18px rgba(244,122,31,0.25))
            drop-shadow(0 3px 14px rgba(59,130,246,0.22));
  }
  .subtitle { font-size: 13px; color: var(--muted); font-weight: 300; }
  .divider {
    width: 90px; height: 2px; margin: 1.2rem auto; border-radius: 2px;
    background: linear-gradient(to right, transparent, var(--orange), var(--gold), var(--blue), transparent);
  }

  #board {
    width: 100%; max-width: 680px;
    display: flex; flex-direction: column; gap: 10px;
    position: relative; z-index: 1;
  }

  #top { display: flex; flex-direction: column; gap: 10px; }

  /* Rest = langsam durchlaufender Lauftext (Platz 6+) */
  #rest-track { will-change: transform; }
  .rseg { display: flex; flex-direction: column; gap: 10px; padding-bottom: 10px; }
  .rrow {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 18px; background: var(--card);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .rrow .rrank { min-width: 24px; text-align: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: var(--muted); flex-shrink: 0; }
  .rrow .remoji { font-size: 22px; flex-shrink: 0; line-height: 1; }
  .rrow .rname { flex: 1; font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rrow .rpts { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); font-variant-numeric: tabular-nums; flex-shrink: 0; }

  /* schlichte Trennlinie (ohne Text) zwischen Top 5 und Rest */
  .rest-sep { height: 0; border-top: 1px solid var(--border); margin: 14px 2px 12px; }

  /* Scrollbereich für Platz 6+ */
  #rest-wrap {
    position: relative; overflow: hidden; padding: 4px 0;
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 22px, #000 calc(100% - 22px), transparent);
            mask-image: linear-gradient(to bottom, transparent, #000 22px, #000 calc(100% - 22px), transparent);
  }

  .row {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    transition: border-color 0.3s ease;
  }

  /* Einblenden beim ersten Laden / bei neuen Teams */
  .row.enter { animation: slideIn 0.5s cubic-bezier(0.22,1,0.36,1) both; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Eurovision-Hervorhebung bei Punktgewinn: Zeile liegt oben + leuchtet */
  .row.gain { z-index: 30; animation: gainGlow 0.9s ease; }
  @keyframes gainGlow {
    0%   { box-shadow: 0 0 0 0 rgba(245,200,66,0); }
    25%  { box-shadow: 0 0 34px 3px rgba(245,200,66,0.55); border-color: var(--gold); }
    100% { box-shadow: 0 0 0 0 rgba(245,200,66,0); }
  }

  .row.rank-1 { border-color: rgba(245,200,66,0.35); }
  .row.rank-2 { border-color: rgba(192,200,216,0.25); }
  .row.rank-3 { border-color: rgba(212,132,90,0.25); }

  .row-top { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }

  .rank-badge {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 16px;
    flex-shrink: 0; border: 1px solid transparent;
    transition: background 0.3s, border-color 0.3s, color 0.3s;
  }
  .rank-badge.r1 { background: rgba(245,200,66,0.12); border-color: rgba(245,200,66,0.5); color: var(--gold); }
  .rank-badge.r2 { background: rgba(192,200,216,0.08); border-color: rgba(192,200,216,0.35); color: var(--silver); }
  .rank-badge.r3 { background: rgba(212,132,90,0.1); border-color: rgba(212,132,90,0.4); color: var(--bronze); }
  .rank-badge.rn { background: rgba(255,255,255,0.04); border-color: var(--border); color: var(--muted); }

  .emoji-icon { font-size: 26px; flex-shrink: 0; line-height: 1; }

  .team-name {
    flex: 1; font-weight: 500; font-size: 16px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .points-display { text-align: right; flex-shrink: 0; }
  .points-num {
    font-family: 'Bebas Neue', sans-serif; font-size: 28px;
    line-height: 1; letter-spacing: 0.03em; color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .points-num.bump { animation: bump 0.6s ease; }
  @keyframes bump {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.4); color: var(--gold); }
    100% { transform: scale(1); }
  }
  .points-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

  .rank-1 .points-num { color: var(--gold); }
  .rank-2 .points-num { color: var(--silver); }
  .rank-3 .points-num { color: var(--bronze); }

  .bar-track { background: rgba(255,255,255,0.06); border-radius: 4px; height: 5px; overflow: hidden; }
  .bar-fill {
    height: 100%; width: 0%; border-radius: 4px;
    background: linear-gradient(to right, #1E4FA0, var(--blue));
    transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
  }
  .rank-1 .bar-fill { background: linear-gradient(to right, #D4A012, var(--gold)); }
  .rank-2 .bar-fill { background: linear-gradient(to right, #8A96B0, var(--silver)); }
  .rank-3 .bar-fill { background: linear-gradient(to right, #A05A32, var(--bronze)); }

  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); font-size: 15px; position: relative; z-index: 1; }
  .update-time { text-align: center; font-size: 11px; color: var(--muted); margin-top: 2rem; letter-spacing: 0.06em; position: relative; z-index: 1; }
  #refresh-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 6px 16px; font-family: inherit; font-size: 12px;
    cursor: pointer; margin-top: 1rem; letter-spacing: 0.06em;
    transition: border-color 0.2s, color 0.2s; position: relative; z-index: 1;
  }
  #refresh-btn:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
</style>
</head>
<body>

<img class="watermark" src="logo.png" alt="" aria-hidden="true">

<header>
  <img class="logo" src="onlyTitle.png" alt="We Will Rock You – Kids vs JFE Team">
  <div class="divider"></div>
  <div class="subtitle" id="header-subtitle">Wettrennen Scoreboard</div>
</header>

<div id="board">
  <div id="top"></div>
  <div class="rest-sep" id="rest-sep" style="display:none;"></div>
  <div id="rest-wrap" style="display:none;"><div id="rest-track"></div></div>
</div>
<div class="empty-state" id="empty" style="display:none;">Noch keine Teams eingetragen.</div>
<div class="update-time" id="update-time"></div>
<button id="refresh-btn" onclick="loadScores()">↻ Aktualisieren</button>

<script>
/* ─── Worker-URL für Live-Daten. Leer lassen, um scores.json direkt zu lesen. ─── */
const WORKER_URL = "https://sommerfest-scoreboard.cass70624.workers.dev";
const SCORES_URL = WORKER_URL ? WORKER_URL + '/api/scores' : 'scores.json';

const TOP_COUNT = 5;                          // so viele Teams bleiben oben fix stehen
const topEl    = document.getElementById('top');
const restTrack = document.getElementById('rest-track');
const restWrap = document.getElementById('rest-wrap');
const restSep  = document.getElementById('rest-sep');
const rows = new Map();   // teamId -> { el, num, bar, badge, points }
let firstLoad = true;

async function loadScores() {
  let data;
  try {
    const sep = SCORES_URL.includes('?') ? '&' : '?';
    const res = await fetch(SCORES_URL + sep + 't=' + Date.now());
    data = await res.json();
  } catch (e) {
    if (!rows.size) showEmpty('Scoreboard konnte nicht geladen werden.');
    return;
  }

  document.getElementById('header-subtitle').textContent = data.subtitle || '';
  if (data.updated)
    document.getElementById('update-time').textContent = 'Zuletzt aktualisiert: ' + data.updated;

  const teams = [...(data.teams || [])].sort((a, b) => b.points - a.points || (a.ts || 0) - (b.ts || 0));
  if (!teams.length) { rows.forEach(r => r.el.remove()); rows.clear(); showEmpty('Noch keine Teams eingetragen.'); return; }
  document.getElementById('empty').style.display = 'none';

  render(teams);
}

function render(teams) {
  renderTop(teams.slice(0, TOP_COUNT));
  renderRest(teams.slice(TOP_COUNT), TOP_COUNT + 1);   // erster Rest-Platz = 6
}

// ── Top 5: feste Zeilen mit Eurovision-Sprung ──
function renderTop(teams) {
  const maxPts = Math.max(...teams.map(t => t.points), 1);

  // FLIP – alte Positionen merken
  const oldTop = new Map();
  rows.forEach((r, id) => oldTop.set(id, r.el.getBoundingClientRect().top));

  const gainers = [];
  teams.forEach((team, i) => {
    let r = rows.get(team.id);
    if (!r) { r = createRow(team); rows.set(team.id, r); }
    if (!firstLoad && team.points > r.points) { r._from = r.points; gainers.push(r); }
    setRow(r, team, i, maxPts);
    r.points = team.points;
    topEl.appendChild(r.el);
  });

  // Teams, die nicht mehr in den Top 5 sind, entfernen (rutschen in den Lauftext)
  rows.forEach((r, id) => {
    if (!teams.some(t => t.id === id)) { r.el.remove(); rows.delete(id); }
  });

  if (!firstLoad) {
    const gainEls = new Set(gainers.map(r => r.el));
    rows.forEach((r, id) => {
      const prev = oldTop.get(id);
      if (prev == null) { r.el.classList.add('enter'); return; }   // neu in den Top 5: einblenden
      const dy = prev - r.el.getBoundingClientRect().top;
      const isGain = gainEls.has(r.el);
      if (!dy && !isGain) return;
      if (isGain) {
        // Gewinner: Sprung mit Lift + leichtem Überschwung, liegt oben drauf
        r.el.animate(
          [
            { transform: `translateY(${dy}px) scale(1.05)` },
            { transform: `translateY(${dy * 0.15}px) scale(1.07)`, offset: 0.55 },
            { transform: 'translateY(0) scale(1)' }
          ],
          { duration: 820, easing: 'cubic-bezier(0.34,1.4,0.64,1)' }
        );
      } else {
        r.el.animate(
          [{ transform: `translateY(${dy}px)` }, { transform: 'translateY(0)' }],
          { duration: 640, easing: 'cubic-bezier(0.22,1,0.36,1)' }
        );
      }
    });
    gainers.forEach(flashGain);
  } else {
    let i = 0;
    rows.forEach(r => { r.el.style.animationDelay = (i++ * 0.07) + 's'; r.el.classList.add('enter'); });
    firstLoad = false;
  }
}

// ── Rest (Platz 6+): langsam durchlaufender Lauftext, nahtlose Schleife ──
function renderRest(teams, startRank) {
  const hasRest = teams.length > 0;
  restSep.style.display  = hasRest ? 'block' : 'none';
  restWrap.style.display = hasRest ? 'block' : 'none';
  if (!hasRest) { restTrack.innerHTML = ''; return; }

  const seg = teams.map((t, i) => `
    <div class="rrow">
      <span class="rrank">${startRank + i}</span>
      <span class="remoji">${t.emoji || '🏆'}</span>
      <span class="rname">${escHtml(t.name)}</span>
      <span class="rpts">${t.points}</span>
    </div>`).join('');
  // zwei identische Kopien → nahtloser Endlos-Lauf
  restTrack.innerHTML = `<div class="rseg">${seg}</div><div class="rseg" aria-hidden="true">${seg}</div>`;
  fitRest();
}

function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function createRow(team) {
  const el = document.createElement('div');
  el.className = 'row';
  el.innerHTML = `
    <div class="row-top">
      <div class="rank-badge"></div>
      <div class="emoji-icon"></div>
      <div class="team-name"></div>
      <div class="points-display">
        <div class="points-num">0</div>
        <div class="points-label">Punkte</div>
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill"></div></div>`;
  return {
    el,
    badge: el.querySelector('.rank-badge'),
    num:   el.querySelector('.points-num'),
    bar:   el.querySelector('.bar-fill'),
    points: -1
  };
}

function setRow(r, team, i, maxPts) {
  const rankCls = ['rank-1', 'rank-2', 'rank-3'][i] || '';
  r.el.className = 'row ' + rankCls;
  r.badge.className = 'rank-badge ' + (['r1', 'r2', 'r3'][i] || 'rn');
  r.badge.textContent = i === 0 ? '★' : (i + 1);
  r.el.querySelector('.emoji-icon').textContent = team.emoji || '🏆';
  r.el.querySelector('.team-name').textContent = team.name;
  r.num.textContent = team.points;
  r.bar.style.width = (team.points / maxPts * 100).toFixed(1) + '%';
}

function flashGain(r) {
  r.el.classList.remove('gain'); void r.el.offsetWidth; r.el.classList.add('gain');
  r.num.classList.remove('bump'); void r.num.offsetWidth; r.num.classList.add('bump');
  countUp(r.num, r._from != null ? r._from : r.points, r.points, 600);  // Zahl hochzählen
}

// Punktzahl flott von 'from' auf 'to' hochzählen
function countUp(el, from, to, ms) {
  const start = performance.now();
  (function tick(now) {
    const p = Math.min(1, (now - start) / ms);
    el.textContent = Math.round(from + (to - from) * p);
    if (p < 1) requestAnimationFrame(tick);
  })(performance.now());
}

function showEmpty(msg) {
  const e = document.getElementById('empty');
  e.textContent = msg; e.style.display = 'block';
}

// Lauftext-Fenster auf ~3,5 Zeilen einstellen (man sieht 3–4 Teams gleichzeitig)
function fitRest() {
  if (restWrap.style.display === 'none') return;
  const row = restTrack.querySelector('.rrow');
  const rh = row ? row.getBoundingClientRect().height + 10 : 56;   // Zeilenhöhe + Abstand
  restWrap.style.height = Math.round(rh * 3.5) + 'px';
}
window.addEventListener('resize', fitRest);

// Lauftext-Motor: Inhalt langsam nach oben schieben, nahtlos loopen (nur wenn er überläuft)
let mPos = 0, mLast = 0;
function marquee(now) {
  if (restWrap.style.display !== 'none') {
    const seg = restTrack.querySelector('.rseg');
    if (seg) {
      const segH = seg.getBoundingClientRect().height;
      if (segH > restWrap.clientHeight + 1) {
        const dt = mLast ? (now - mLast) / 1000 : 0;
        mPos -= 22 * dt;                  // 22 px/s – langsam
        if (mPos <= -segH) mPos += segH;  // nahtlos: zweite Kopie steht exakt an Kopie-1-Position
        restTrack.style.transform = `translateY(${mPos}px)`;
      } else {
        mPos = 0; restTrack.style.transform = 'translateY(0)';
      }
    }
  }
  mLast = now;
  requestAnimationFrame(marquee);
}
requestAnimationFrame(marquee);

loadScores();
setInterval(loadScores, 10000);   // alle 10 s aktualisieren (schont GitHub-/Cloudflare-Limit)
</script>
</body>
</html>
