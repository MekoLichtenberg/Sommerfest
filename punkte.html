<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Punkte vergeben</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #14151c; --card: #1e2029; --border: #2c2f3a; --text: #f0eef8;
    --muted: #8b8a99; --accent: #4ade80; --minus: #f87171; --input-bg: #181a22;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    padding: 1.25rem 1rem 3rem; -webkit-tap-highlight-color: transparent;
  }
  .container { max-width: 520px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 1.5rem; position: relative; }
  .header .badge { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 5px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 0.03em; line-height: 1; }
  .logout { position: absolute; right: 0; top: 4px; font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; }

  /* Login */
  .login-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    padding: 2rem 1.75rem; text-align: center; max-width: 360px; margin: 3rem auto 0;
  }
  .login-card .lock { font-size: 40px; margin-bottom: 0.75rem; }
  .login-card p { color: var(--muted); font-size: 14px; margin-bottom: 1.25rem; }
  input[type=password] {
    width: 100%; background: var(--input-bg); border: 1.5px solid var(--border);
    border-radius: 11px; padding: 13px 15px; font-family: inherit; font-size: 16px;
    color: var(--text); outline: none; text-align: center; letter-spacing: 0.1em;
  }
  input:focus { border-color: var(--accent); }
  input.shake { animation: shake 0.4s; border-color: var(--minus); }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .btn-primary {
    width: 100%; background: var(--accent); color: #06281a; border: none;
    border-radius: 11px; padding: 14px; font-family: inherit; font-size: 16px;
    font-weight: 700; cursor: pointer; margin-top: 1rem;
  }
  .login-err { color: var(--minus); font-size: 13px; height: 18px; margin-top: 0.75rem; }

  /* Team cards */
  #teams { display: flex; flex-direction: column; gap: 12px; }
  .team {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 14px 16px;
  }
  .team-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .team-emoji { font-size: 30px; line-height: 1; }
  .team-name { font-size: 17px; font-weight: 600; flex: 1; }
  .team-points {
    font-family: 'Bebas Neue', sans-serif; font-size: 38px; line-height: 0.9;
    color: var(--accent); min-width: 50px; text-align: right;
  }
  .team-points.flash { animation: flash 0.5s; }
  @keyframes flash { 0%{transform:scale(1.25)} 100%{transform:scale(1)} }

  .pts-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px; }
  .pts-btn {
    border: none; border-radius: 10px; padding: 12px 0; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.08s, filter 0.1s;
    color: #fff;
  }
  .pts-btn:active { transform: scale(0.92); }
  .pts-btn.plus { background: rgba(74,222,128,0.16); color: var(--accent); }
  .pts-btn.plus:hover { filter: brightness(1.2); }
  .pts-btn.minus { background: rgba(248,113,113,0.15); color: var(--minus); }
  .pts-btn.minus:hover { filter: brightness(1.2); }

  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--minus); color: #fff; padding: 11px 20px; border-radius: 10px;
    font-size: 14px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 10;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 15px; }
  .hidden { display: none !important; }
  .refresh { display: block; margin: 1.5rem auto 0; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 9px; padding: 8px 18px; font-family: inherit; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">Schiedsrichter</div>
    <h1>Punkte vergeben</h1>
    <span class="logout hidden" id="logout" onclick="logout()">Ausloggen</span>
  </div>

  <!-- Login -->
  <div class="login-card" id="login-card">
    <div class="lock">🔒</div>
    <p>Passwort für die Punktevergabe</p>
    <input type="password" id="pw" placeholder="••••••" autocomplete="off"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err"></div>
    <button class="btn-primary" onclick="doLogin()" id="login-btn">Einloggen</button>
  </div>

  <!-- Teams -->
  <div id="teams" class="hidden"></div>
  <div class="empty hidden" id="empty">Noch keine Teams angemeldet.</div>
  <button class="refresh hidden" id="refresh" onclick="loadTeams()">↻ Aktualisieren</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ─── Hier die URL deines Workers eintragen ─── */
const WORKER_URL = "https://sommerfest-scoreboard.cass70624.workers.dev";
/* ──────────────────────────────────────────── */

const STEPS = [-5, -1, 1, 3, 5, 10];
let sessionPw = '';
let teams = [];

async function doLogin() {
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  try {
    const res = await fetch(WORKER_URL + '/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ role: 'referee', password: pw })
    });
    const data = await res.json();
    if (data.ok) {
      sessionPw = pw;
      document.getElementById('login-card').classList.add('hidden');
      document.getElementById('logout').classList.remove('hidden');
      document.getElementById('refresh').classList.remove('hidden');
      loadTeams();
    } else {
      const inp = document.getElementById('pw');
      inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake'); inp.value = '';
      document.getElementById('login-err').textContent = 'Falsches Passwort.';
    }
  } catch (e) {
    document.getElementById('login-err').textContent = 'Verbindungsfehler.';
  }
  btn.disabled = false;
}

function logout() { sessionPw = ''; location.reload(); }

async function loadTeams() {
  try {
    const res = await fetch(WORKER_URL + '/api/scores');
    const data = await res.json();
    teams = (data.teams || []).slice().sort((a,b) => b.points - a.points);
    render();
  } catch (e) { toast('Konnte nicht laden'); }
}

function render() {
  const wrap = document.getElementById('teams');
  const empty = document.getElementById('empty');
  if (!teams.length) { wrap.classList.add('hidden'); empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden'); wrap.classList.remove('hidden');
  wrap.innerHTML = '';
  teams.forEach(t => {
    const el = document.createElement('div');
    el.className = 'team';
    el.innerHTML = `
      <div class="team-head">
        <span class="team-emoji">${t.emoji}</span>
        <span class="team-name">${escHtml(t.name)}</span>
        <span class="team-points" id="pts-${t.id}">${t.points}</span>
      </div>
      <div class="pts-row">
        ${STEPS.map(s => `<button class="pts-btn ${s>0?'plus':'minus'}" onclick="award('${t.id}',${s})">${s>0?'+':''}${s}</button>`).join('')}
      </div>`;
    wrap.appendChild(el);
  });
}

async function award(teamId, delta) {
  const team = teams.find(t => t.id === teamId);
  if (!team) return;
  // optimistisch sofort anzeigen
  team.points = Math.max(0, team.points + delta);
  const el = document.getElementById('pts-' + teamId);
  if (el) { el.textContent = team.points; el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }

  try {
    const res = await fetch(WORKER_URL + '/api/points', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: sessionPw, teamId, delta })
    });
    const data = await res.json();
    if (data.ok) {
      teams = data.teams.slice().sort((a,b) => b.points - a.points);
      // sanft neu rendern (Reihenfolge kann sich ändern)
      setTimeout(render, 400);
    } else {
      toast(data.error || 'Fehler'); loadTeams();
    }
  } catch (e) { toast('Verbindungsfehler'); loadTeams(); }
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
